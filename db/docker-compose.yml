services:
  postgresql:
    container_name: acessoria-sql
    restart: unless-stopped
    build: .
    tty: true
    stdin_open: true
    volumes:
      - ./data:/var/lib/postgresql/data
      - ./scripts:/scripts
      - ./.psqlrc:/etc/postgresql-common/psqlrc
    ports:
      - '5433:5432'
    env_file:
      - .env